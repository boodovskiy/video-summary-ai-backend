name: Fly Diagnostics

on:
  workflow_dispatch:

jobs:
  inspect:
    name: Inspect backend machine
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Show app status
        run: flyctl status --app backend-wispy-fire-4184
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Show machine status
        run: flyctl machine status 1781359c215568 --app backend-wispy-fire-4184
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Show recent application logs
        if: always()
        run: flyctl logs --app backend-wispy-fire-4184 --no-tail
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
